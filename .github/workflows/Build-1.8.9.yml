name: Build-1.8.9

on:
  push:
    paths:
      - '**/*.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract zip
        run: |
          set -euo pipefail
          shopt -s nullglob
          zips=( input/*.zip *.zip )
          if [ ${#zips[@]} -eq 0 ]; then
            echo "ERROR: No .zip file found in input/ or repository root." >&2
            exit 1
          fi
          CHOSEN_ZIP="${zips[0]}"
          echo "Using zip: $CHOSEN_ZIP"
          mkdir -p work
          unzip "$CHOSEN_ZIP" -d work

      - name: Detect Gradle project root
        run: |
          set -euo pipefail
          PROJECT_ROOT=""
          for marker in settings.gradle settings.gradle.kts build.gradle build.gradle.kts; do
            match=$(find work -maxdepth 5 -name "$marker" | sort | head -n 1)
            if [ -n "$match" ]; then
              PROJECT_ROOT="$(dirname "$match")"
              echo "Detected project root via $marker: $PROJECT_ROOT"
              break
            fi
          done
          if [ -z "$PROJECT_ROOT" ]; then
            echo "ERROR: No Gradle project root found after extraction." >&2
            exit 1
          fi
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> "$GITHUB_ENV"

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Set up Gradle 2.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '2.7'

      - name: Verify Gradle installation
        run: |
          set -euo pipefail
          if ! command -v gradle &>/dev/null; then
            echo "ERROR: gradle command is not available." >&2
            exit 1
          fi
          gradle --version

      - name: Build mod with Gradle
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT"
          gradle build --no-daemon

      - name: Upload built mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-build
          path: ${{ env.PROJECT_ROOT }}/build/libs/*.jar
